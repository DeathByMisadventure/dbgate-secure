name: Build and Push Images

on:
  push:
    branches: ['main']

env:
  REGISTRY: ghcr.io
  # Base image name (your repo)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        variant:
          - chainguard
          - distroless
          # - ironbank

    steps:
      - name: Lowercase repository name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata for this specific variant
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            # You can add more tag patterns here (e.g. semver, sha, etc.)
          flavor: |
            # This makes the variant part of the tag, e.g. :latest-chainguard
            suffix=-${{ matrix.variant }},onlatest=true

      # Build and push using the specific Dockerfile
      - name: Build and push Docker image (${{ matrix.variant }})
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.${{ matrix.variant }}   # e.g. Dockerfile.chainguard
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Optional: Run Trivy on the just-built image
      # Note: The "latest" tag will be overwritten by each variant,
      # so scanning "latest" here would only catch the last one in the matrix.
      # Better to scan a specific tag or remove this if you don't need per-variant scans.
      - name: Run Trivy vulnerability scanner (${{ matrix.variant }})
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ matrix.variant }}'
          format: 'table'
          exit-code: '0'
          hide-progress: true
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'
